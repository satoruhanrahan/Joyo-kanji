<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>常用漢字 — Jōyō Kanji Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;500&family=IM+Fell+English:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --paper-dark: #ece5d4;
    --vermillion: #c0392b;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --stone: #8c7b6b;
    --mist: #d4ccbc;
    --seal-red: #8b1a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(184,134,11,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(192,57,43,0.03) 0%, transparent 50%);
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--mist);
    padding: 2rem 3rem 1.5rem;
    display: flex;
    align-items: flex-end;
    gap: 2rem;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '漢';
    position: absolute;
    right: -1rem;
    top: -2rem;
    font-family: 'Noto Serif JP', serif;
    font-size: 14rem;
    font-weight: 700;
    color: rgba(184,134,11,0.05);
    pointer-events: none;
    line-height: 1;
  }

  .header-title h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--ink);
    line-height: 1;
  }

  .header-title .subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--stone);
    margin-top: 0.4rem;
    letter-spacing: 0.03em;
  }

  .header-meta {
    margin-left: auto;
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--stone);
    line-height: 1.8;
  }

  .header-meta .count {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  /* Search bar */
  .search-bar {
    padding: 1.5rem 3rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    border-bottom: 1px solid var(--mist);
    background: rgba(255,255,255,0.3);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 500px;
  }

  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--stone);
    font-size: 0.9rem;
  }

  #search {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.8rem;
    border: 1px solid var(--mist);
    border-radius: 2px;
    background: rgba(255,255,255,0.7);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #search:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
  }

  .filter-pills {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .pill {
    padding: 0.4rem 1rem;
    border: 1px solid var(--mist);
    border-radius: 2px;
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--stone);
  }

  .pill:hover, .pill.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* Grid */
  .grid-wrap {
    display: flex;
    gap: 0;
  }

  #kanji-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 1px;
    background: var(--mist);
    flex: 1;
    padding: 0;
    align-content: start;
    max-height: calc(100vh - 180px);
    overflow-y: auto;
  }

  .kanji-cell {
    background: var(--paper);
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    padding: 4px;
  }

  .kanji-cell:hover {
    background: var(--paper-dark);
    z-index: 1;
  }

  .kanji-cell.selected {
    background: var(--ink);
  }

  .kanji-cell.selected .kanji-char {
    color: var(--paper);
  }

  .kanji-cell.selected .kanji-meaning {
    color: var(--gold-light);
  }

  .kanji-char {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.8rem;
    font-weight: 400;
    line-height: 1;
    color: var(--ink);
  }

  .kanji-meaning {
    font-size: 0.5rem;
    color: var(--stone);
    text-align: center;
    line-height: 1.2;
    margin-top: 2px;
    max-width: 64px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'Space Mono', monospace;
  }

  /* Detail panel */
  #detail-panel {
    width: 380px;
    min-height: calc(100vh - 180px);
    border-left: 1px solid var(--mist);
    padding: 2.5rem 2rem;
    position: sticky;
    top: 0;
    overflow-y: auto;
    max-height: calc(100vh - 180px);
    background: var(--paper);
    transition: opacity 0.3s;
  }

  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60%;
    color: var(--mist);
    font-family: 'Noto Serif JP', serif;
    text-align: center;
  }

  .detail-empty .big-char {
    font-size: 6rem;
    opacity: 0.3;
    line-height: 1;
  }

  .detail-empty p {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.9rem;
    margin-top: 1rem;
    opacity: 0.5;
  }

  /* Detail content */
  .detail-hero {
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
    margin-bottom: 2rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--mist);
  }

  .detail-kanji-big {
    font-family: 'Noto Serif JP', serif;
    font-size: 5.5rem;
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
    flex-shrink: 0;
    border: 1px solid var(--mist);
    width: 110px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    position: relative;
  }

  .detail-kanji-big::before,
  .detail-kanji-big::after {
    content: '';
    position: absolute;
    background: var(--mist);
  }

  .detail-kanji-big::before {
    width: 1px;
    height: 100%;
    left: 50%;
    opacity: 0.4;
  }

  .detail-kanji-big::after {
    height: 1px;
    width: 100%;
    top: 50%;
    opacity: 0.4;
  }

  .detail-meta {
    flex: 1;
  }

  .detail-meanings {
    font-family: 'IM Fell English', serif;
    font-size: 1.3rem;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  .detail-badges {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 0.2rem 0.6rem;
    border: 1px solid;
    border-radius: 2px;
  }

  .badge-grade { border-color: var(--gold); color: var(--gold); }
  .badge-strokes { border-color: var(--stone); color: var(--stone); }
  .badge-jlpt { border-color: var(--vermillion); color: var(--vermillion); }

  /* Readings section */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--stone);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--mist);
  }

  .section {
    margin-bottom: 1.8rem;
  }

  .readings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .reading-block {
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--mist);
    padding: 0.75rem;
  }

  .reading-type {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--stone);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.3rem;
  }

  .reading-kana {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    color: var(--ink);
    line-height: 1.4;
  }

  .reading-romaji {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--stone);
  }

  /* Radical */
  .radical-display {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--mist);
    padding: 1rem;
  }

  .radical-char {
    font-family: 'Noto Serif JP', serif;
    font-size: 3rem;
    font-weight: 300;
    color: var(--vermillion);
    line-height: 1;
    min-width: 50px;
    text-align: center;
  }

  .radical-info {
    flex: 1;
  }

  .radical-name {
    font-family: 'IM Fell English', serif;
    font-size: 1rem;
    color: var(--ink);
  }

  .radical-meaning {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--stone);
    margin-top: 0.2rem;
  }

  /* Ancient forms */
  .ancient-forms {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
  }

  .ancient-form {
    border: 1px solid var(--mist);
    padding: 0.75rem 0.5rem;
    text-align: center;
    background: rgba(255,255,255,0.6);
    transition: border-color 0.2s;
  }

  .ancient-form:hover {
    border-color: var(--gold);
  }

  .ancient-form-char {
    font-size: 1.8rem;
    line-height: 1.2;
    margin-bottom: 0.3rem;
    min-height: 2.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ancient-form-char img {
    max-height: 2.2rem;
    max-width: 2.2rem;
    object-fit: contain;
  }

  .ancient-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: var(--stone);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .ancient-label-jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.65rem;
    color: var(--stone);
    margin-top: 1px;
  }

  /* Example words */
  .words-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .word-item {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 0.6rem 0.75rem;
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--mist);
  }

  .word-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    color: var(--ink);
    min-width: 60px;
  }

  .word-reading {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.8rem;
    color: var(--stone);
    min-width: 70px;
  }

  .word-meaning {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--stone);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--paper); }
  ::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--stone); }

  /* Red seal decoration */
  .seal {
    display: inline-block;
    background: var(--seal-red);
    color: white;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.65rem;
    padding: 0.2rem 0.5rem;
    letter-spacing: 0.05em;
  }

  .grade-indicator {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .grade-dots {
    display: flex;
    gap: 3px;
  }

  .grade-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--mist);
  }

  .grade-dot.filled { background: var(--gold); }

  /* Wikidata link */
  .external-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--stone);
    text-decoration: none;
    border: 1px solid var(--mist);
    padding: 0.4rem 0.75rem;
    margin-top: 0.5rem;
    transition: all 0.15s;
  }

  .external-link:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-content {
    animation: fadeIn 0.25s ease;
  }

  .results-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--stone);
    padding: 0.5rem 3rem;
    background: rgba(255,255,255,0.3);
    border-bottom: 1px solid var(--mist);
  }

</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>常用漢字</h1>
    <div class="subtitle">Jōyō Kanji — The Essential Characters of Modern Japanese</div>
  </div>
  <div class="header-meta">
    <span class="count">2,136</span>
    characters designated by the<br>
    Ministry of Education, 2010
  </div>
</header>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>

  </div>
  <div class="filter-pills">
    <button class="pill active" data-filter="all">All</button>
    <button class="pill" data-filter="1">Grade 1</button>
    <button class="pill" data-filter="2">Grade 2</button>
    <button class="pill" data-filter="3">Grade 3</button>
    <button class="pill" data-filter="4">Grade 4</button>
    <button class="pill" data-filter="5">Grade 5</button>
    <button class="pill" data-filter="6">Grade 6</button>
    <button class="pill" data-filter="S">Secondary</button>
  </div>
</div>

<div class="results-count" id="results-count">Showing all 2,136 characters</div>

<div class="grid-wrap">
  <div id="kanji-grid"></div>
  <div id="detail-panel">

      <div class="big-char">字</div>
      <p>Select a character to explore its history,<br>readings, and ancient forms</p>
    </div>
  </div>
</div>

let filteredData = [...kanjiData];

let selectedKanji = null;

function renderGrid(data) {
  const grid = document.getElementById('kanji-grid');
  grid.innerHTML = '';
  document.getElementById('results-count').textContent =
    `Showing ${data.length.toLocaleString()} of 2,136 characters (${data.length} with full data loaded)`;

  data.forEach(k => {
    const cell = document.createElement('div');
    cell.className = 'kanji-cell' + (selectedKanji?.kanji === k.kanji ? ' selected' : '');
    cell.innerHTML = `<span class="kanji-char">${k.kanji}</span><span class="kanji-meaning">${k.meanings[0]}</span>`;
    cell.addEventListener('click', () => selectKanji(k));
    grid.appendChild(cell);
  });
}

function selectKanji(k) {
  selectedKanji = k;
  renderGrid(filteredData);

  const panel = document.getElementById('detail-panel');

    <div class="detail-hero">

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  filterAndRender(q, activeFilter);
});

// Filter pills
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', function() {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.filter;
    const q = document.getElementById('search').value.toLowerCase().trim();
    filterAndRender(q, activeFilter);
  });
});

function filterAndRender(q, grade) {
  filteredData = kanjiData.filter(k => {
    const matchGrade = grade === 'all' || String(k.grade) === grade;
    const matchSearch = !q || k.kanji.includes(q) ||
      k.meanings.some(m => m.toLowerCase().includes(q)) ||
      k.on.some(r => r.includes(q)) ||
      k.kun.some(r => r.includes(q)) ||
      k.romaji_on.some(r => r.includes(q)) ||
      k.romaji_kun.some(r => r.includes(q));
    return matchGrade && matchSearch;
  });
  renderGrid(filteredData);
}

// Select first kanji by default
