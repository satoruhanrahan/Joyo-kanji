<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>常用漢字 — Jōyō Kanji Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;500&family=IM+Fell+English:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --paper: #f5f0e8;
  --paper-dark: #ece5d4;
  --vermillion: #c0392b;
  --gold: #b8860b;
  --gold-light: #d4a017;
  --stone: #8c7b6b;
  --mist: #d4ccbc;
  --seal-red: #8b1a1a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(184,134,11,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(192,57,43,0.03) 0%, transparent 50%);
}
header {
  border-bottom: 1px solid var(--mist);
  padding: 2rem 3rem 1.5rem;
  display: flex;
  align-items: flex-end;
  gap: 2rem;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '漢';
  position: absolute;
  right: -1rem; top: -2rem;
  font-family: 'Noto Serif JP', serif;
  font-size: 14rem; font-weight: 700;
  color: rgba(184,134,11,0.05);
  pointer-events: none; line-height: 1;
}
.header-title h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: 2.4rem; font-weight: 700;
  letter-spacing: 0.05em; color: var(--ink); line-height: 1;
}
.header-title .subtitle {
  font-family: 'IM Fell English', serif;
  font-style: italic; font-size: 1rem;
  color: var(--stone); margin-top: 0.4rem; letter-spacing: 0.03em;
}
.header-meta {
  margin-left: auto; text-align: right;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem; color: var(--stone); line-height: 1.8;
}
.header-meta .count {
  font-size: 1.8rem; font-weight: 700;
  color: var(--gold); display: block; line-height: 1;
}
.search-bar {
  padding: 1.2rem 2rem;
  display: flex; gap: 1rem; align-items: center;
  border-bottom: 1px solid var(--mist);
  background: rgba(255,255,255,0.3);
  flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 420px; }
.search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--stone); font-size: 0.85rem; }
#search {
  width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem;
  border: 1px solid var(--mist); border-radius: 2px;
  background: rgba(255,255,255,0.7);
  font-family: 'Noto Sans JP', sans-serif; font-size: 1rem; color: var(--ink); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#search:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,134,11,0.1); }
.filter-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.pill {
  padding: 0.35rem 0.85rem; border: 1px solid var(--mist); border-radius: 2px;
  font-size: 0.72rem; font-family: 'Space Mono', monospace;
  cursor: pointer; transition: all 0.15s; background: transparent; color: var(--stone);
}
.pill:hover, .pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.results-count {
  font-family: 'Space Mono', monospace; font-size: 0.68rem;
  color: var(--stone); padding: 0.45rem 2rem;
  background: rgba(255,255,255,0.3); border-bottom: 1px solid var(--mist);
}
.grid-wrap { display: flex; overflow: hidden; }
#kanji-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
  gap: 1px; background: var(--mist);
  flex: 1; align-content: start;
  height: calc(100vh - 170px); overflow-y: auto;
  min-width: 200px;
}
.kanji-cell {
  background: var(--paper); aspect-ratio: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.1s; position: relative; padding: 4px;
}
.kanji-cell:hover { background: var(--paper-dark); z-index: 1; }
.kanji-cell.selected { background: var(--ink); }
.kanji-cell.selected .kanji-char { color: var(--paper); }
.kanji-cell.selected .kanji-meaning { color: var(--gold-light); }
.kanji-char { font-family: 'Noto Serif JP', serif; font-size: 1.75rem; font-weight: 400; line-height: 1; color: var(--ink); }
.kanji-meaning { font-size: 0.48rem; color: var(--stone); text-align: center; line-height: 1.2; margin-top: 2px; max-width: 62px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'Space Mono', monospace; }
#divider {
  width: 6px; flex-shrink: 0;
  height: calc(100vh - 170px);
  background: var(--mist);
  cursor: col-resize;
  position: relative;
  transition: background 0.15s;
  user-select: none;
}
#divider:hover, #divider.dragging { background: var(--gold); }
#divider::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 2px; height: 32px;
  border-left: 1px solid currentColor;
  border-right: 1px solid currentColor;
  opacity: 0.4;
}
#detail-panel {
  width: 360px; flex-shrink: 0;
  padding: 2rem 1.75rem;
  height: calc(100vh - 170px); overflow-y: auto;
  background: var(--paper);
  min-width: 240px;
}
.detail-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 60%; color: var(--mist); font-family: 'Noto Serif JP', serif; text-align: center;
}
.detail-empty .big-char { font-size: 6rem; opacity: 0.3; line-height: 1; }
.detail-empty p { font-family: 'IM Fell English', serif; font-style: italic; font-size: 0.9rem; margin-top: 1rem; opacity: 0.5; }
.detail-hero { display: flex; align-items: flex-start; gap: 1.2rem; margin-bottom: 1.75rem; padding-bottom: 1.75rem; border-bottom: 1px solid var(--mist); }
.detail-kanji-big {
  font-family: 'Noto Serif JP', serif; font-size: 5rem; font-weight: 300; line-height: 1;
  color: var(--ink); flex-shrink: 0; border: 1px solid var(--mist);
  width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;
  background: white; position: relative;
}
.detail-kanji-big::before, .detail-kanji-big::after { content: ''; position: absolute; background: var(--mist); }
.detail-kanji-big::before { width: 1px; height: 100%; left: 50%; opacity: 0.35; }
.detail-kanji-big::after { height: 1px; width: 100%; top: 50%; opacity: 0.35; }
.detail-meta { flex: 1; }
.detail-meanings { font-family: 'IM Fell English', serif; font-size: 1.2rem; color: var(--ink); line-height: 1.35; margin-bottom: 0.4rem; }
.detail-badges { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.6rem; }
.badge { font-family: 'Space Mono', monospace; font-size: 0.62rem; padding: 0.18rem 0.55rem; border: 1px solid; border-radius: 2px; }
.badge-grade { border-color: var(--gold); color: var(--gold); }
.badge-strokes { border-color: var(--stone); color: var(--stone); }
.badge-jlpt { border-color: var(--vermillion); color: var(--vermillion); }
.badge-freq { border-color: var(--stone); color: var(--stone); }
.section { margin-bottom: 1.6rem; }
.section-label {
  font-family: 'Space Mono', monospace; font-size: 0.62rem;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--stone);
  margin-bottom: 0.55rem; display: flex; align-items: center; gap: 0.5rem;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--mist); }
.readings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
.reading-block { background: rgba(255,255,255,0.6); border: 1px solid var(--mist); padding: 0.65rem; }
.reading-type { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--stone); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
.reading-kana { font-family: 'Noto Serif JP', serif; font-size: 1rem; color: var(--ink); line-height: 1.5; }
.radical-display { display: flex; align-items: center; gap: 1rem; background: rgba(255,255,255,0.6); border: 1px solid var(--mist); padding: 0.9rem; }
.radical-char { font-family: 'Noto Serif JP', serif; font-size: 2.6rem; font-weight: 300; color: var(--vermillion); line-height: 1; min-width: 44px; text-align: center; }
.radical-info { flex: 1; }
.radical-name { font-family: 'IM Fell English', serif; font-size: 0.95rem; color: var(--ink); }
.radical-sub { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--stone); margin-top: 0.2rem; }
.ancient-forms { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.65rem; }
.ancient-form { border: 1px solid var(--mist); padding: 0.65rem 0.4rem; text-align: center; background: rgba(255,255,255,0.6); transition: border-color 0.2s; }
.ancient-form:hover { border-color: var(--gold); }
.ancient-form-char { font-size: 1.6rem; line-height: 1.3; margin-bottom: 0.25rem; min-height: 2rem; display: flex; align-items: center; justify-content: center; font-family: 'Noto Serif JP', serif; color: var(--ink); }
.ancient-label { font-family: 'Space Mono', monospace; font-size: 0.52rem; color: var(--stone); text-transform: uppercase; letter-spacing: 0.06em; }
.ancient-label-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 0.6rem; color: var(--stone); margin-top: 1px; }
.wiktionary-note { font-family: 'IM Fell English', serif; font-style: italic; font-size: 0.8rem; color: var(--stone); line-height: 1.6; padding: 0.65rem; background: rgba(255,255,255,0.5); border: 1px solid var(--mist); }

/* Ancient forms dynamic display */
.ancient-forms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 0.6rem;
  margin-top: 0.65rem;
}
.ancient-form-card {
  border: 1px solid var(--mist);
  background: rgba(255,255,255,0.65);
  padding: 0.6rem 0.4rem 0.5rem;
  text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: default;
}
.ancient-form-card:hover { border-color: var(--gold); box-shadow: 0 2px 8px rgba(184,134,11,0.1); }
.ancient-form-card img {
  width: 100%;
  max-width: 64px;
  height: 64px;
  object-fit: contain;
  display: block;
  margin: 0 auto 0.35rem;
  filter: sepia(20%) contrast(1.1);
}
.ancient-form-script {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  color: var(--stone);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  line-height: 1.3;
}
.ancient-form-script-jp {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.58rem;
  color: var(--stone);
  margin-top: 1px;
  opacity: 0.75;
}
.ancient-forms-loading {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  color: var(--stone); padding: 0.75rem 0;
}
.ancient-forms-loading::before {
  content: '';
  width: 10px; height: 10px;
  border: 1.5px solid var(--mist);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ancient-forms-none {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.8rem;
  color: var(--stone);
  padding: 0.5rem 0;
  opacity: 0.7;
}
.ancient-forms-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 0.5rem; flex-wrap: wrap; gap: 0.4rem;
}
.ancient-forms-source {
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  color: var(--stone);
  opacity: 0.6;
}
.ancient-script-tag {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 0.48rem;
  padding: 1px 5px;
  border-radius: 1px;
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.tag-oracle { background: rgba(139,26,26,0.1); color: var(--seal-red); border: 1px solid rgba(139,26,26,0.2); }
.tag-bronze { background: rgba(184,134,11,0.1); color: var(--gold); border: 1px solid rgba(184,134,11,0.2); }
.tag-seal   { background: rgba(140,123,107,0.1); color: var(--stone); border: 1px solid rgba(140,123,107,0.2); }
.tag-other  { background: rgba(26,18,8,0.06); color: var(--ink); border: 1px solid var(--mist); }
.external-links { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
.external-link {
  display: inline-flex; align-items: center; gap: 0.35rem;
  font-family: 'Space Mono', monospace; font-size: 0.62rem;
  color: var(--stone); text-decoration: none; border: 1px solid var(--mist);
  padding: 0.35rem 0.65rem; transition: all 0.15s;
}
.external-link:hover { border-color: var(--gold); color: var(--gold); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--stone); }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.detail-content { animation: fadeIn 0.2s ease; }
@media (max-width: 900px) {
  #detail-panel { width: 300px; }
  header { padding: 1.2rem 1.5rem; }
  .search-bar { padding: 0.8rem 1rem; }
}
@media (max-width: 640px) {
  .grid-wrap { flex-direction: column; }
  #detail-panel { width: 100%; height: auto; border-left: none; border-top: 1px solid var(--mist); }
  #kanji-grid { height: 50vh; }
}

/* Component chips */
.components-grid {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
}
.comp-chip {
  display: flex; flex-direction: column; align-items: center;
  border: 1px solid var(--mist); background: rgba(255,255,255,0.6);
  padding: 0.5rem 0.6rem; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  min-width: 52px; text-align: center;
}
.comp-chip:hover {
  border-color: var(--gold); background: rgba(255,255,255,0.95);
}
.comp-chip.is-joyo:hover { border-color: var(--vermillion); }
.comp-chip-char {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.6rem; line-height: 1.1; color: var(--ink);
}
.comp-chip-name {
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem; color: var(--stone);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-top: 3px; max-width: 58px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.comp-chip.is-joyo .comp-chip-char { color: var(--vermillion); }
.comp-chip-badge {
  font-family: 'Space Mono', monospace;
  font-size: 0.45rem; color: var(--paper);
  background: var(--vermillion); padding: 1px 4px;
  border-radius: 1px; margin-top: 2px; letter-spacing: 0.04em;
}
/* Breadcrumb nav */
.detail-nav {
  display: flex; align-items: center; gap: 0.4rem;
  margin-bottom: 1.2rem; flex-wrap: wrap;
}
.nav-crumb {
  font-family: 'Space Mono', monospace; font-size: 0.65rem;
  color: var(--stone); cursor: pointer; text-decoration: underline;
  text-underline-offset: 3px;
}
.nav-crumb:hover { color: var(--gold); }
.nav-sep { font-size: 0.6rem; color: var(--mist); }
.nav-current { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--ink); }
</style>
</head>
<body>
<header>
  <div class="header-title">
    <h1>常用漢字</h1>
    <div class="subtitle">Jōyō Kanji — The Essential Characters of Modern Japanese</div>
  </div>
  <div class="header-meta">
    <span class="count">2,136</span>
    characters designated by the<br>Ministry of Education, 2010
  </div>
</header>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search kanji, meaning, or reading…" autocomplete="off">
  </div>
  <div class="filter-pills">
    <button class="pill active" data-filter="all">All</button>
    <button class="pill" data-filter="1">Grade 1</button>
    <button class="pill" data-filter="2">Grade 2</button>
    <button class="pill" data-filter="3">Grade 3</button>
    <button class="pill" data-filter="4">Grade 4</button>
    <button class="pill" data-filter="5">Grade 5</button>
    <button class="pill" data-filter="6">Grade 6</button>
    <button class="pill" data-filter="S">Secondary</button>
  </div>
</div>

<div class="results-count" id="results-count">Loading…</div>

<div class="grid-wrap">
  <div id="kanji-grid"></div>
  <div id="divider"></div>
  <div id="detail-panel">
    <div class="detail-empty">
      <div class="big-char">字</div>
      <p>Select a character to explore its<br>readings, radical, and ancient forms</p>
    </div>
  </div>
</div>

function cleanKun(kun) {
  // Remove okurigana markers like ひと- or -び or ひと.つ → show base form
  return kun.replace(/[-\.].*/,'').replace(/^-/,'');
}

function renderGrid(data) {
  const grid = document.getElementById('kanji-grid');
  const frag = document.createDocumentFragment();
  grid.innerHTML = '';

  const total = KANJI_DATA.length;
  document.getElementById('results-count').textContent =
    data.length === total
      ? `Showing all ${total.toLocaleString()} Jōyō kanji`
      : `Showing ${data.length.toLocaleString()} of ${total.toLocaleString()} kanji`;

  data.forEach(k => {
    const cell = document.createElement('div');
    cell.className = 'kanji-cell' + (selectedKanji && selectedKanji.k === k.k ? ' selected' : '');
    cell.innerHTML = `<span class="kanji-char">${k.k}</span><span class="kanji-meaning">${k.m[0] || ''}</span>`;
    cell.addEventListener('click', () => selectKanji(k));
    frag.appendChild(cell);
  });
  grid.appendChild(frag);

// Navigation history for breadcrumb
let navHistory = [];

function selectKanji(k, addToHistory) {
  if (addToHistory === undefined) addToHistory = true;
  if (addToHistory) navHistory = [];
  selectedKanji = k;
  // Re-render just the selected state
  document.querySelectorAll('.kanji-cell').forEach(cell => {
    const isSelected = cell.querySelector('.kanji-char').textContent === k.k;
    cell.classList.toggle('selected', isSelected);
    if (isSelected) {
      cell.querySelector('.kanji-meaning').style.color = 'var(--gold-light)';
    } else {
      cell.querySelector('.kanji-meaning').style.color = '';
    }
  });
  renderDetail(k, navHistory);
}

function navigateToComponent(char) {
  // Find in joyo data first
  const joyo = KANJI_DATA.find(k => k.k === char);
  if (joyo) {
    if (selectedKanji) navHistory.push(selectedKanji);
    selectedKanji = joyo;
    // Update grid selection
    document.querySelectorAll('.kanji-cell').forEach(cell => {
      const isSelected = cell.querySelector('.kanji-char').textContent === joyo.k;
      cell.classList.toggle('selected', isSelected);
      cell.querySelector('.kanji-meaning').style.color = isSelected ? 'var(--gold-light)' : '';
    });
    renderDetail(joyo, navHistory);
    // Scroll the selected cell into view
    const selected = document.querySelector('.kanji-cell.selected');
    if (selected) selected.scrollIntoView({ block: 'nearest' });
  } else {
    // Non-joyo radical — show a minimal panel
    if (selectedKanji) navHistory.push(selectedKanji);
    renderRadicalDetail(char, navHistory);
  }
}

    if (!matchGrade) return false;

    return k.k.includes(q) ||
      k.m.some(m => m.toLowerCase().includes(q)) ||
      k.on.some(r => r.toLowerCase().includes(q)) ||
      k.kun.some(r => r.toLowerCase().includes(q)) ||

// Basic katakana → romaji for search
function toRomaji(str) {
  const map = {
    'ア':'a','イ':'i','ウ':'u','エ':'e','オ':'o',
    'カ':'ka','キ':'ki','ク':'ku','ケ':'ke','コ':'ko',
    'サ':'sa','シ':'shi','ス':'su','セ':'se','ソ':'so',
    'タ':'ta','チ':'chi','ツ':'tsu','テ':'te','ト':'to',
    'ナ':'na','ニ':'ni','ヌ':'nu','ネ':'ne','ノ':'no',
    'ハ':'ha','ヒ':'hi','フ':'fu','ヘ':'he','ホ':'ho',
    'マ':'ma','ミ':'mi','ム':'mu','メ':'me','モ':'mo',
    'ヤ':'ya','ユ':'yu','ヨ':'yo',
    'ラ':'ra','リ':'ri','ル':'ru','レ':'re','ロ':'ro',
    'ワ':'wa','ヲ':'wo','ン':'n',
    'ガ':'ga','ギ':'gi','グ':'gu','ゲ':'ge','ゴ':'go',
    'ザ':'za','ジ':'ji','ズ':'zu','ゼ':'ze','ゾ':'zo',
    'ダ':'da','ヂ':'di','ヅ':'du','デ':'de','ド':'do',
    'バ':'ba','ビ':'bi','ブ':'bu','ベ':'be','ボ':'bo',
    'パ':'pa','ピ':'pi','プ':'pu','ペ':'pe','ポ':'po',
    'キャ':'kya','キュ':'kyu','キョ':'kyo',
    'シャ':'sha','シュ':'shu','ショ':'sho',
    'チャ':'cha','チュ':'chu','チョ':'cho',
    'ニャ':'nya','ニュ':'nyu','ニョ':'nyo',
    'ヒャ':'hya','ヒュ':'hyu','ヒョ':'hyo',
    'ミャ':'mya','ミュ':'myu','ミョ':'myo',
    'リャ':'rya','リュ':'ryu','リョ':'ryo',
    'ギャ':'gya','ギュ':'gyu','ギョ':'gyo',
    'ジャ':'ja','ジュ':'ju','ジョ':'jo',
    'ビャ':'bya','ビュ':'byu','ビョ':'byo',
    'ピャ':'pya','ピュ':'pyu','ピョ':'pyo',
  };
  let result = str;
  // Handle double consonants (ッ)
  result = result.replace(/ッ(.)/g, (m,c) => { const r = map[c]||''; return r ? r[0]+r : m; });
  // Long vowels (ー)
  result = result.replace(/ー/g, '');
  // Sort keys longest first to handle digraphs
  const keys = Object.keys(map).sort((a,b) => b.length - a.length);
  for (const k of keys) result = result.split(k).join(map[k]);
  return result.toLowerCase();
}

// Ancient forms fetcher
// Script type classification
const SCRIPT_META = {
  oracle:  { en: 'Oracle Bone', jp: '甲骨文', tag: 'tag-oracle' },
  bronze:  { en: 'Bronze Script', jp: '金文',  tag: 'tag-bronze' },
  seal:    { en: 'Seal Script',  jp: '篆書',  tag: 'tag-seal'   },
  other:   { en: 'Old Script',   jp: '古文字', tag: 'tag-other'  },
};

function classifyScript(filename) {
  const f = filename.toLowerCase();
  if (f.includes('oracle') || f.includes('jiaguwen') || f.includes('jgw') || f.includes('甲骨')) return 'oracle';
  if (f.includes('bronze') || f.includes('jinwen') || f.includes('jnw') || f.includes('金文')) return 'bronze';
  if (f.includes('seal') || f.includes('zhuanshu') || f.includes('shuowen') || f.includes('篆') || f.includes('-sw') || f.includes('-ls')) return 'seal';
  return 'other';
}

async function fetchAncientForms(kanji, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;

  try {
    // Fetch Wiktionary page HTML via the REST API (returns sections)
    const apiUrl = `https://en.wiktionary.org/api/rest_v1/page/html/${encodeURIComponent(kanji)}`;
    const resp = await fetch(apiUrl, { headers: { 'Accept': 'text/html' } });
    if (!resp.ok) throw new Error('not found');
    const html = await resp.text();

    // Parse the HTML to find images in the Han character / glyph origin section
    const doc = new DOMParser().parseFromString(html, 'text/html');

    // Collect all images that look like ancient script forms
    const imgs = Array.from(doc.querySelectorAll('img'));
    const formImgs = imgs.filter(img => {
      const src = (img.getAttribute('src') || img.getAttribute('data-src') || '').toLowerCase();
      const alt = (img.getAttribute('alt') || '').toLowerCase();
      // Look for images in evolution/glyph/ancient form sections
      return (
        src.includes('oracle') || src.includes('bronze') || src.includes('seal') ||
        src.includes('jinwen') || src.includes('jiaguwen') || src.includes('shuowen') ||
        src.includes('zhuanshu') || src.includes('-jgw') || src.includes('-jnw') ||
        src.includes('-sw.') || src.includes('-ls.') ||
        alt.includes('oracle') || alt.includes('bronze') || alt.includes('seal') ||
        // Wiktionary uses specific filename patterns for evolution charts
        /u[0-9a-f]+-[a-z]/.test(src)
      );
    });

    // Also search specifically in glyph origin / character evolution sections
    // Wiktionary wraps these in specific figure captions
    const figures = Array.from(doc.querySelectorAll('figure, .thumb, td img'));
    const figImgs = figures.flatMap(fig => {
      const img = fig.tagName === 'IMG' ? fig : fig.querySelector('img');
      if (!img) return [];
      const src = img.getAttribute('src') || '';
      const caption = fig.textContent || '';
      const isAncient =
        /oracle|bronze|seal|jinwen|jiaguwen|shuowen|zhuanshu|甲骨|金文|篆/i.test(src + caption);
      return isAncient ? [img] : [];
    });

    const allImgs = [...new Map([...formImgs, ...figImgs].map(i => [i.getAttribute('src'), i])).values()];

    if (allImgs.length === 0) {
      // Fallback: try the Wiktionary image API for known evolution image naming patterns
      await fetchAncientFormsFallback(kanji, container);
      return;
    }

    renderAncientForms(allImgs, kanji, container);

  } catch (e) {
    await fetchAncientFormsFallback(kanji, container);
  }
}

async function fetchAncientFormsFallback(kanji, container) {
  // Try Wikimedia Commons API: search for images related to this kanji's Unicode point
  const cp = kanji.codePointAt(0).toString(16).toUpperCase().padStart(4, '0');
  const searchTerms = [
    `${kanji} oracle bone script`,
    `${kanji} bronze script`,
    `U+${cp} glyph`,
  ];

  try {
    const query = `${kanji} oracle bone bronze seal script Chinese character`;
    const apiUrl = `https://en.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(kanji)}&prop=images&format=json&origin=*`;
    const resp = await fetch(apiUrl);
    const data = await resp.json();
    const pages = data.query?.pages || {};
    const page = Object.values(pages)[0];
    const images = page?.images || [];

    const ancientImages = images.filter(img => {
      const t = img.title.toLowerCase();
      return t.includes('oracle') || t.includes('bronze') || t.includes('seal') ||
             t.includes('jinwen') || t.includes('jiaguwen') || t.includes('shuowen') ||
             t.includes('zhuanshu') || t.includes('-jgw') || t.includes('-jnw') ||
             t.includes('-sw.') || t.includes('-ls.') || t.includes('glyph');
    });

    if (ancientImages.length === 0) {
      showNoForms(kanji, container);
      return;
    }

    // Fetch image URLs from Wikimedia
    const titles = ancientImages.slice(0, 9).map(i => i.title).join('|');
    const imgApiUrl = `https://en.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(titles)}&prop=imageinfo&iiprop=url|extmetadata&format=json&origin=*`;
    const imgResp = await fetch(imgApiUrl);
    const imgData = await imgResp.json();
    const imgPages = imgData.query?.pages || {};

    const resolved = Object.values(imgPages)
      .filter(p => p.imageinfo?.[0]?.url)
      .map(p => ({
        url: p.imageinfo[0].url,
        title: p.title || '',
      }));

    if (resolved.length === 0) {
      showNoForms(kanji, container);
      return;
    }

    renderAncientFormsFromUrls(resolved, kanji, container);

  } catch(e) {
    showNoForms(kanji, container);
  }
}

function renderAncientForms(imgs, kanji, container) {
  const cards = imgs.slice(0, 9).map(img => {
    let src = img.getAttribute('src') || '';
    // Fix protocol-relative URLs
    if (src.startsWith('//')) src = 'https:' + src;
    // Upscale Wiktionary thumbnails (replace /thumb/ path and size)
    src = src.replace(/\/thumb\//, '/').replace(/\/\d+px-[^\/]+$/, '');
    const filename = src.split('/').pop() || '';
    const script = classifyScript(filename);
    const meta = SCRIPT_META[script];
    return { src, meta };
  }).filter(c => c.src);

  if (cards.length === 0) { showNoForms(kanji, container); return; }

  container.innerHTML = buildFormsHTML(cards, kanji);
}

function renderAncientFormsFromUrls(items, kanji, container) {
  const cards = items.slice(0, 9).map(item => {
    const script = classifyScript(item.title);
    const meta = SCRIPT_META[script];
    return { src: item.url, meta };
  });
  container.innerHTML = buildFormsHTML(cards, kanji);
}

function buildFormsHTML(cards, kanji) {
  const wikiUrl = `https://en.wiktionary.org/wiki/${encodeURIComponent(kanji)}#Han_character`;
  const grid = cards.map(c => `
    <div class="ancient-form-card">
      <img src="${c.src}" alt="${c.meta.en} form" loading="lazy"
           onerror="this.closest('.ancient-form-card').style.display='none'">
      <span class="ancient-script-tag ${c.meta.tag}">${c.meta.en}</span>
      <div class="ancient-form-script-jp">${c.meta.jp}</div>
    </div>
  `).join('');

  return `
    <div class="ancient-forms-grid">${grid}</div>
    <div class="ancient-forms-footer">
      <span class="ancient-forms-source">Source: Wiktionary / Wikimedia Commons</span>
      <a class="external-link" href="${wikiUrl}" target="_blank" style="font-size:0.58rem;padding:0.25rem 0.5rem;">↗ Full etymology</a>
    </div>
  `;
}

function showNoForms(kanji, container) {
  const wikiUrl = `https://en.wiktionary.org/wiki/${encodeURIComponent(kanji)}#Han_character`;
  container.innerHTML = `
    <div class="ancient-forms-none">
      Historical glyph images not found in database for this character.
    </div>
    <div class="ancient-forms-footer">
      <a class="external-link" href="${wikiUrl}" target="_blank">↗ Check Wiktionary for etymology</a>
    </div>
  `;
}



// Resizable divider
(function() {
  const divider = document.getElementById('divider');
  const panel   = document.getElementById('detail-panel');
  const wrap    = divider.closest('.grid-wrap');
  let dragging  = false;
  let startX, startWidth;

  divider.addEventListener('mousedown', e => {
    dragging  = true;
    startX    = e.clientX;
    startWidth = panel.offsetWidth;
    divider.classList.add('dragging');
    document.body.style.cursor    = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta   = startX - e.clientX;          // drag left = wider panel
    const wrapW   = wrap.offsetWidth;
    const minPanel = parseInt(getComputedStyle(panel).minWidth) || 240;
    const minGrid  = 200;
    const newWidth = Math.min(
      Math.max(startWidth + delta, minPanel),
      wrapW - minGrid - divider.offsetWidth
    );
    panel.style.width = newWidth + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });

  // Touch support
  divider.addEventListener('touchstart', e => {
    dragging   = true;
    startX     = e.touches[0].clientX;
    startWidth = panel.offsetWidth;
    divider.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const delta    = startX - e.touches[0].clientX;
    const wrapW    = wrap.offsetWidth;
    const minPanel = parseInt(getComputedStyle(panel).minWidth) || 240;
    const newWidth = Math.min(
      Math.max(startWidth + delta, minPanel),
      wrapW - 200 - divider.offsetWidth
    );
    panel.style.width = newWidth + 'px';
  }, { passive: true });

  document.addEventListener('touchend', () => {
    dragging = false;
    divider.classList.remove('dragging');
  });
})();
</script>
</body>
</html>
